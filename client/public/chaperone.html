<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>HomeDirectAI Chaperone</title>
    <meta name="description" content="Earn $20 per showing. The DoorDash of real estate tours." />

    <!-- Chaperone PWA Manifest -->
    <link rel="manifest" href="/manifest-chaperone.json" />
    <meta name="theme-color" content="#0d1a12" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chaperone" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background: #0d1a12; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Set the hash to chaperone-app so React renders the right view
      if (!window.location.hash || !window.location.hash.includes('chaperone-app')) {
        window.location.hash = '#/chaperone-app';
      }
    </script>
  </body>
</html>
